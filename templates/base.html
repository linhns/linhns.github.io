<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family:wght@100=Roboto&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ get_url(path="style.css", trailing_slash=false) | safe }}">
    
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    
    <title>
        {% block title %}
         {{ config.title }}
        {% endblock title %}
    </title>
</head>
<body>
    <header>
        <nav class="top-navigation">
            <div class="logo">linhns</div>
            <div class="links">
                {% for link in config.extra.nav_links %}
                    {% set url = link.url | replace(from="$BASE_URL", to=config.base_url) %}
                    <a href="{{url | safe}}">{{link.name}}</a>
                {% endfor %}
            </div>
        </nav>
    </header>
    <div class="container">
        {% block content %}
         
        {% endblock %}
    </div>
    <footer>
        <p class="copyright-text">
            Built by linhns. Powered by Zola.
        </p>
    </footer>

    <script>
        feather.replace()
    </script>
</body>
</html>
